<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira de Estudante DNE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#AFDCCD">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app">
        <!-- Banner de instalação de app -->
        <div class="install-banner" id="install-banner">
            <div class="install-message">
                <i class="fas fa-download"></i>
                <span>Instale o app para melhor experiência</span>
            </div>
            <button id="install-button">Instalar</button>
            <button id="close-banner" class="close-banner"><i class="fas fa-times"></i></button>
        </div>

        <!-- Tela de lista de carteirinhas -->
        <div class="panel" id="panel">
            <header>
                <div class="logo">
                    <img src="logo.png" alt="DNE Logo">
                </div>
            </header>
            
            <div class="card-list" id="card-list">
                <!-- Cards serão adicionados aqui dinamicamente -->
            </div>
            
            <button class="add-button" id="add-button">
                <i class="fas fa-plus"></i> Adicionar Carteirinha
            </button>
        </div>

        <!-- Tela de visualização de carteirinha -->
        <div class="card-view" id="card-view">
            <div class="card-container">
                <div class="card-header">
                    <img src="logo-dne-branco.webp" alt="DNE Logo" class="card-logo">
                    <img src="logoazul.webp" alt="UE Logo" class="ue-logo">
                </div>
                
                <div class="student-info">
                    <div class="student-photo-qr">
                        <div class="student-photo" id="display-photo-container">
                            <img id="display-photo" src="" alt="Foto do Estudante">
                        </div>
                        <div class="qr-code">
                            <img src="qrcode.svg" alt="QR Code" style="width: 100%; height: auto;">
                            <div class="code-use" id="display-code-use"></div>
                        </div>
                    </div>
                    
                    <div class="student-details">
                        <h2 id="display-name"></h2>
                        <p id="display-institution"></p>
                        <p id="display-course"></p>
                        <p id="display-level"></p>
                        <p id="display-cpf"></p>
                        <p id="display-rg"></p>
                        <p id="display-registration"></p>
                        <p id="display-birth"></p>
                        <p id="display-validity"></p>
                    </div>
                    
                    <div class="footer-logo">
                        <img src="logo2.png" alt="UE Logo">
                    </div>
                </div>
                
                <div class="wallet-button">
                    <button id="add-to-wallet">
                        <i class="fas fa-wallet"></i> Adicionar à Carteira da Apple
                    </button>
                </div>
                
                <button class="back-button" id="back-button">
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- Tela de cadastro -->
        <div class="form-container" id="form-container">
            <h2>Cadastrar Nova Carteirinha</h2>
            <form id="student-form">
                <div class="form-group">
                    <label for="name">Nome Completo:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="institution">Instituição de Ensino:</label>
                    <input type="text" id="institution" required>
                </div>
                
                <div class="form-group">
                    <label for="course">Curso:</label>
                    <input type="text" id="course" required>
                </div>
                
                <div class="form-group">
                    <label for="level">Nível de Ensino:</label>
                    <select id="level" required>
                        <option value="Graduação">Graduação</option>
                        <option value="Mestrado">Mestrado</option>
                        <option value="Doutorado">Doutorado</option>
                        <option value="Secundário">Secundário</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00">
                </div>
                
                <div class="form-group">
                    <label for="rg">RG:</label>
                    <input type="text" id="rg" required>
                </div>
                
                <div class="form-group">
                    <label for="registration">Matrícula:</label>
                    <input type="text" id="registration">
                </div>
                
                <div class="form-group">
                    <label for="birth">Data de Nascimento:</label>
                    <input type="date" id="birth" required>
                </div>
                
                <div class="form-group">
                    <label for="validity">Validade:</label>
                    <input type="month" id="validity" required>
                </div>
                
                <div class="form-group">
                    <label for="photo">Foto:</label>
                    <input type="file" id="photo" accept="image/*" required>
                    <div class="photo-preview" id="photo-preview"></div>
                </div>
                
                <div class="form-buttons">
                    <button type="submit" id="save-button">Salvar</button>
                    <button type="button" id="cancel-button">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Registrar o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                .then(registration => {
                    console.log('Service Worker registrado com sucesso:', registration.scope);
                })
                .catch(error => {
                    console.log('Falha ao registrar o Service Worker:', error);
                });
            });
        }
    </script>
</body>
</html>
